    <!-- CONFIGURAÇÃO TELEGRAM WEBAPP -->
    <script>
    (function() {
        'use strict';

        // Inicializar Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const webapp = window.Telegram.WebApp;
            
            // Expandir para ocupar a tela inteira
            webapp.expand();
            
            // Configurar cores para mesclar com o site (esconder barra superior)
            // Usamos a cor de fundo do site para o header e background do app
            const bgColor = "#0a0e1a"; // --bg-primary
            webapp.setHeaderColor(bgColor);
            webapp.setBackgroundColor(bgColor);
            
            // Avisar que o app está pronto
            webapp.ready();
        }

        // Função para obter parâmetro da URL
        function getUrlParam(param) {
            var urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Verificar se ymid está presente na URL
        function hasValidUserId() {
            var userId = getUrlParam('ymid');
            // ymid deve existir e não estar vazio
            return userId && userId.length > 0;
        }

        // Armazenar ymid globalmente para uso posterior
        window.TELEGRAM_USER_ID = getUrlParam('ymid');

        // Verificar imediatamente se ymid está presente
        if (!hasValidUserId()) {
            // Redirecionar para tela de login
            window.location.href = '/login.html';
            return;
        }
    })();
    </script>

<!-- SISTEMA DE VERIFICAÇÃO DE CLICKS VIA API (lógica mantida nos bastidores) -->
<script>
    (function() {
        'use strict';
        
        const API_BASE_URL = 'https://monetag-postback-server-production.up.railway.app/api/stats/user/';
        const MAX_CLICKS = 2;
        const MAX_IMPRESSIONS = 20;
        const CHECK_INTERVAL = 2000;
        const ID_CHECK_INTERVAL = 500;
        let overlayCreated = false;
        let checkInterval = null;
        
        function getUserId() {
          const allElements = document.querySelectorAll('*');
          for (let el of allElements) {
            const text = el.textContent || el.innerText || '';
            const match = text.match(/ID:\s*(\d+)/);
            if (match && match[1]) {
              if (el.children.length === 0 || text.trim().startsWith('ID:')) {
                return match[1];
              }
            }
          }
          const urlParams = new URLSearchParams(window.location.search);
          return urlParams.get('ymid') || urlParams.get('id') || urlParams.get('user_id') || null;
        }
        
        console.log('[API CLICK CHECKER] Iniciado - Limite: ' + MAX_CLICKS + ' clicks');
        
        function clickWatchAdButton() {
          const buttons = document.querySelectorAll('button');
          for (let btn of buttons) {
            const text = btn.textContent || btn.innerText || '';
            if (text.includes('ASSISTIR') || text.includes('ANÚCIO') || text.includes('WATCH')) {
              console.log('[AUTO AD] Clicando no botão de anúncio...');
              btn.click();
              return true;
            }
          }
          console.log('[AUTO AD] Botão de anúncio não encontrado');
          return false;
        }
        
        function setupButtonInterceptor() {
          const observer = new MutationObserver(function() {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(function(btn) {
              if (btn.dataset.intercepted) return;
              
              const text = btn.textContent || btn.innerText || '';
              if (text.includes('ASSISTIR') || text.includes('ANÚCIO') || text.includes('WATCH')) {
                btn.dataset.intercepted = 'true';
                
                btn.addEventListener('click', function() {
                  console.log('[INTERCEPTOR] Botão de anúncio clicado! Verificando API imediatamente...');
                  
                  const userId = getUserId();
                  if (userId) {
                    fetch(API_BASE_URL + userId)
                      .then(function(response) { return response.json(); })
                      .then(function(data) {
                        console.log('[INTERCEPTOR] Resposta da API:', data);
                        if (data.success && data.total_clicks >= MAX_CLICKS) {
                          console.log('[INTERCEPTOR] Limite atingido! Mostrando overlay...');
                          setTimeout(function() {
                            createFloatingOverlay(data.total_clicks);
                          }, 500);
                        }
                      })
                      .catch(function(err) {
                        console.error('[INTERCEPTOR] Erro:', err);
                      });
                  }
                });
                
                console.log('[INTERCEPTOR] Botão de anúncio interceptado');
              }
            });
          });
          
          observer.observe(document.body || document.documentElement, { childList: true, subtree: true });
          
          const existingButtons = document.querySelectorAll('button');
          existingButtons.forEach(function(btn) {
            const text = btn.textContent || btn.innerText || '';
            if (text.includes('ASSISTIR') || text.includes('ANÚCIO') || text.includes('WATCH')) {
              if (!btn.dataset.intercepted) {
                btn.dataset.intercepted = 'true';
                
                btn.addEventListener('click', function() {
                  console.log('[INTERCEPTOR] Botão de anúncio clicado! Verificando API imediatamente...');
                  
                  const userId = getUserId();
                  if (userId) {
                    fetch(API_BASE_URL + userId)
                      .then(function(response) { return response.json(); })
                      .then(function(data) {
                        console.log('[INTERCEPTOR] Resposta da API:', data);
                        if (data.success && data.total_clicks >= MAX_CLICKS) {
                          console.log('[INTERCEPTOR] Limite atingido! Mostrando overlay...');
                          setTimeout(function() {
                            createFloatingOverlay(data.total_clicks);
                          }, 500);
                        }
                      })
                      .catch(function(err) {
                        console.error('[INTERCEPTOR] Erro:', err);
                      });
                  }
                });
                
                console.log('[INTERCEPTOR] Botão existente interceptado');
              }
            }
          });
        }
        
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          setupButtonInterceptor();
        } else {
          document.addEventListener('DOMContentLoaded', setupButtonInterceptor);
        }
        
        function createFloatingOverlay(totalClicks) {
          if (overlayCreated) return;
          overlayCreated = true;
          
          if (checkInterval) {
            clearInterval(checkInterval);
            checkInterval = null;
          }
          
          console.log('[API CLICK CHECKER] ⚠️ LIMITE ATINGIDO! Criando tela flutuante transparente...');
          
          const overlay = document.createElement('div');
          overlay.id = 'api-click-overlay';
          overlay.style.cssText = `
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: rgba(0, 0, 0, 0.5) !important;
            z-index: 2147483647 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            animation: fadeInOverlay 0.5s ease !important;
            pointer-events: auto !important;
          `;
          
          ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'touchmove', 'contextmenu', 'pointerdown', 'pointerup'].forEach(function(eventType) {
            overlay.addEventListener(eventType, function(e) {
              if (e.target.tagName === 'BUTTON') return;
              e.stopPropagation();
              e.stopImmediatePropagation();
              e.preventDefault();
              console.log('[OVERLAY] Evento ' + eventType + ' bloqueado - anúncio protegido');
              return false;
            }, true);
          });
          
          const message = document.createElement('div');
          message.style.cssText = `
            background: #ffffff !important;
            padding: 35px 40px !important;
            border-radius: 16px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
            text-align: center !important;
            max-width: 90% !important;
            width: 380px !important;
            animation: scaleInOverlay 0.4s ease !important;
            pointer-events: auto !important;
          `;
          
          message.innerHTML = `
            <div style="width: 60px; height: 60px; margin: 0 auto 20px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <h2 style="margin: 0 0 12px 0; color: #1f2937; font-size: 22px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Missão Concluída</h2>
            <p style="margin: 0 0 20px 0; color: #6b7280; font-size: 14px; line-height: 1.5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
              Você completou <strong style="color: #1f2937;">${totalClicks} cliques</strong> com sucesso.
            </p>
            <div style="padding: 12px 16px; background: #f3f4f6; border-radius: 8px;">
              <p id="countdown-text" style="margin: 0; color: #4b5563; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
                Aguardando...
              </p>
            </div>
          `;
          
          overlay.appendChild(message);
          document.documentElement.appendChild(overlay);
          
          if (!document.getElementById('api-click-overlay-animations')) {
            const style = document.createElement('style');
            style.id = 'api-click-overlay-animations';
            style.textContent = `
              @keyframes fadeInOverlay {
                from { opacity: 0; }
                to { opacity: 1; }
              }
              @keyframes scaleInOverlay {
                from { opacity: 0; transform: scale(0.95) translateY(10px); }
                to { opacity: 1; transform: scale(1) translateY(0); }
              }
              @keyframes fadeOutOverlay {
                from { opacity: 1; }
                to { opacity: 0; }
              }
              #api-click-overlay {
                z-index: 2147483647 !important;
                position: fixed !important;
              }
            `;
            document.head.appendChild(style);
          }
          
          function keepOverlayOnTop() {
            const overlayEl = document.getElementById('api-click-overlay');
            if (!overlayEl) return;
            
            if (overlayEl.parentNode !== document.documentElement || overlayEl !== document.documentElement.lastElementChild) {
              document.documentElement.appendChild(overlayEl);
            }
            
            overlayEl.style.zIndex = '2147483647';
          }
          
          setInterval(keepOverlayOnTop, 200);
          
          console.log('[API CLICK CHECKER] ✅ Tela flutuante transparente criada');
          console.log('[API CLICK CHECKER] ✅ Sistema de proteção de overlay ativado');
          
          let countdown = 20;
          let countdownStarted = false;
          let countdownInterval = null;
          const countdownTextElement = document.getElementById('countdown-text');
          
          function startCountdown() {
            if (countdownStarted) return;
            countdownStarted = true;
            
            console.log('[COUNTDOWN] Tela de anúncio detectada! Iniciando contador de 20 segundos...');
            
            if (countdownTextElement) {
              countdownTextElement.innerHTML = 'Recarregando em <span id="countdown-timer" style="color: #1f2937; font-size: 18px; font-weight: 600;">20</span> segundos';
            }
            
            countdownInterval = setInterval(function() {
              countdown--;
              const timerElement = document.getElementById('countdown-timer');
              if (timerElement) {
                timerElement.textContent = countdown;
              }
              console.log('[COUNTDOWN] ' + countdown + ' segundos restantes...');
              
              if (countdown <= 0) {
                clearInterval(countdownInterval);
                console.log('[COUNTDOWN] Tempo esgotado! Recarregando página...');
                window.location.reload();
              }
            }, 1000);
          }
          
          function checkForAdScreen() {
            const adIndicators = [
              'iframe[src*="monetag"]',
              'iframe[src*="ad"]',
              '[class*="monetag"]',
              '[id*="monetag"]',
              'div[style*="z-index: 2147483647"]',
              'iframe[style*="z-index"]'
            ];
            
            for (let selector of adIndicators) {
              const elements = document.querySelectorAll(selector);
              if (elements.length > 0) {
                startCountdown();
                return true;
              }
            }
            
            const iframes = document.querySelectorAll('iframe');
            if (iframes.length > 0) {
              startCountdown();
              return true;
            }
            
            return false;
          }
          
          checkForAdScreen();
          const adCheckInterval = setInterval(function() {
            if (checkForAdScreen()) {
              clearInterval(adCheckInterval);
            }
          }, 500);
          
          setTimeout(function() {
            if (!countdownStarted) {
              console.log('[COUNTDOWN] Fallback: iniciando contador após 2 segundos');
              startCountdown();
            }
          }, 2000);
          
          console.log('[AUTO AD] Iniciando anúncios automáticos...');
          
          setTimeout(function() {
            clickWatchAdButton();
          }, 1000);
          
          setInterval(function() {
            console.log('[AUTO AD] Tentando abrir novo anúncio...');
            clickWatchAdButton();
          }, 30000);
        }
        
        async function checkApiClicks() {
          const userId = getUserId();
          
          if (!userId) {
            console.log('[API CLICK CHECKER] ⚠️ Nenhum ID de usuário encontrado na URL');
            return;
          }
          
          try {
            const response = await fetch(API_BASE_URL + userId);
            const data = await response.json();
            
            console.log('[API CLICK CHECKER] Resposta da API:', data);
            
            if (data.success) {
              const totalClicks = data.total_clicks || 0;
              const totalImpressions = data.total_impressions || 0;
              
              if (totalImpressions >= MAX_IMPRESSIONS && totalClicks >= MAX_CLICKS) {
                console.log('[API CLICK CHECKER] Tarefa COMPLETA! ' + totalImpressions + '/' + MAX_IMPRESSIONS + ' impressões e ' + totalClicks + '/' + MAX_CLICKS + ' cliques. Diálogo não será exibido.');
                return;
              }
              
              if (totalClicks >= MAX_CLICKS) {
                console.log('[API CLICK CHECKER] ⚠️ ' + totalClicks + ' clicks detectados! (limite: ' + MAX_CLICKS + ')');
                createFloatingOverlay(totalClicks);
              } else {
                console.log('[API CLICK CHECKER] Clicks atuais: ' + totalClicks + '/' + MAX_CLICKS + ' | Impressões: ' + totalImpressions + '/' + MAX_IMPRESSIONS);
              }
            }
          } catch (error) {
            console.error('[API CLICK CHECKER] Erro ao verificar API:', error);
          }
        }
        
        function startChecking() {
          if (checkInterval) return;
          
          const userId = getUserId();
          if (userId) {
            console.log('[API CLICK CHECKER] ID do usuário encontrado: ' + userId);
            console.log('[API CLICK CHECKER] Iniciando verificação periódica...');
            
            checkApiClicks();
            
            checkInterval = setInterval(checkApiClicks, CHECK_INTERVAL);
          }
        }
        
        let idCheckInterval = null;
        function waitForId() {
          const userId = getUserId();
          if (userId) {
            console.log('[API CLICK CHECKER] ID detectado na tela: ' + userId);
            if (idCheckInterval) {
              clearInterval(idCheckInterval);
              idCheckInterval = null;
            }
            startChecking();
          } else {
            console.log('[API CLICK CHECKER] Aguardando ID aparecer na tela...');
          }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
          waitForId();
          
          if (!checkInterval) {
            idCheckInterval = setInterval(waitForId, ID_CHECK_INTERVAL);
          }
        });
        
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          waitForId();
          if (!checkInterval && !idCheckInterval) {
            idCheckInterval = setInterval(waitForId, ID_CHECK_INTERVAL);
          }
        }
        
        const observer = new MutationObserver(function(mutations) {
          if (!checkInterval) {
            const userId = getUserId();
            if (userId) {
              console.log('[API CLICK CHECKER] ID detectado via MutationObserver: ' + userId);
              startChecking();
              observer.disconnect();
            }
          }
        });
        
        if (document.body) {
          observer.observe(document.body, { childList: true, subtree: true });
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            observer.observe(document.body, { childList: true, subtree: true });
          });
        }
        
        console.log('[API CLICK CHECKER] ✅ Sistema de verificação instalado');
    })();
</script>

    // Função para enviar impressão ao servidor (postback.php) - chamada APENAS no evento 'end'
    async function sendImpressionToServer() {
        if (!TaskState.userId) {
            console.warn('[POSTBACK] ⚠️ User ID não disponível para postback');
            return;
        }

        // Evitar duplicatas (cooldown de 3 segundos)
        const now = Date.now();
        if (now - TaskState.lastImpressionSent < 3000) {
            console.log('[POSTBACK] Impressão ignorada (cooldown)');
            return;
        }
        TaskState.lastImpressionSent = now;

        console.log('[POSTBACK] 📤 Enviando impressão após anúncio finalizado...');

        // Método 1: Usar proxy local (sem CORS) - envia para ambas APIs no servidor
        const proxyUrl = `/api/postback?type=impression&user_id=${TaskState.userId}`;
        let proxySuccess = false;
        try {
            _manualPostbackInProgress = true;
            const response = await fetch(proxyUrl, { method: 'GET' });
            _manualPostbackInProgress = false;
            const data = await response.json();

            if (data.success) {
                proxySuccess = true;
                console.log('[POSTBACK] ✅ Impressão registrada com sucesso (via proxy)!');
                if (data.data && data.data.progress) {
                    console.log(`[POSTBACK] 📊 Progresso: ${data.data.progress.impressions}/${data.data.progress.required_impressions}`);
                    if (data.data.progress.all_completed) {
                        console.log('[POSTBACK] 🎉 Tarefa COMPLETA!');
                    }
                }
            } else {
                console.error('[POSTBACK] ❌ Erro no proxy:', data.error);
            }
        } catch (err) {
            _manualPostbackInProgress = false;
            console.warn('[POSTBACK] ⚠️ Proxy falhou, tentando fallbacks diretos...', err.message);
        }

        // Método 2: Se proxy falhou, enviar direto via Image (bypass CORS)
        if (!proxySuccess) {
            _manualPostbackInProgress = true;

            const mainUrl = `https://youngmoney-api-railway-production.up.railway.app/monetag/postback.php?type=impression&user_id=${TaskState.userId}`;
            const fallbackUrl = `https://monetag-postback-server-production.up.railway.app/api/postback?type=impression&user_id=${TaskState.userId}`;

            try {
                const img = new Image();
                img.src = mainUrl + '&t=' + Date.now();
                console.log('[POSTBACK] 📤 Enviado via Image (API principal)');
            } catch (e) {
                console.warn('[POSTBACK] ⚠️ Image fallback falhou:', e.message);
            }

            try {
                const img2 = new Image();
                img2.src = fallbackUrl + '&t=' + Date.now();
                console.log('[POSTBACK] 📤 Enviado via Image (API fallback)');
            } catch (e) {
                console.warn('[POSTBACK] ⚠️ Image fallback 2 falhou:', e.message);
            }

            if (navigator.sendBeacon) {
                try {
                    navigator.sendBeacon(mainUrl);
                    console.log('[POSTBACK] 📤 Enviado via sendBeacon (API principal)');
                } catch (e) {}
            }

            _manualPostbackInProgress = false;
        }

        // Atualizar stats após envio
        setTimeout(() => fetchStats(), 1500);
    }
    
    // Função para detectar tipo de evento baseado na URL
    function detectEventType(url) {
        if (url.includes('event_type=impression') || url.includes('event_type%3Dimpression')) {
            return 'impression';
        }
        return null;
    }
    
    // Função para verificar se é um postback automático do Monetag
    function isMonetagPostback(url) {
        if (typeof url !== 'string') return false;
        if (url.includes('/api/stats/user/')) return false;
        const isPostbackUrl = url.includes('postback') && 
            (url.includes('youngmoney-api-railway') || url.includes('monetag-postback-server') || url.includes('youngmoney-bot'));
        const isRelativePostback = (url.startsWith('/api/postback') || url.includes('/api/postback'));
        const hasUnresolvedYmid = url.includes('%7Bymid%7D') || url.includes('{ymid}');
        const isAutoImpression = url.includes('event_type=impression') || url.includes('event_type%3Dimpression');
        return isPostbackUrl || isRelativePostback || hasUnresolvedYmid || isAutoImpression;
    }
    
    // Flag para permitir nosso postback manual
    let _manualPostbackInProgress = false;

    // Interceptar fetch - bloquear postbacks automáticos do Monetag
    const originalFetch = window.fetch;
    window.fetch = function(...args) {
        const url = args[0]?.url || args[0] || '';
        if (_manualPostbackInProgress) {
            return originalFetch.apply(this, args);
        }
        if (typeof url === 'string' && isMonetagPostback(url)) {
            console.log('[INTERCEPTOR] 🚫 Postback automático do Monetag BLOQUEADO:', url);
            return Promise.resolve(new Response(JSON.stringify({success: true}), { status: 200 }));
        }
        return originalFetch.apply(this, args);
    };
    
    // Interceptar XMLHttpRequest
    const originalXHROpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        if (typeof url === 'string' && isMonetagPostback(url)) {
            console.log('[INTERCEPTOR] 🚫 XHR Postback automático do Monetag bloqueado:', url);
            this._blocked = true;
        }
        return originalXHROpen.call(this, method, url, ...rest);
    };
    
    // Interceptar Image (pixel tracking)
    const originalImage = window.Image;
    window.Image = function() {
        const img = new originalImage();
        const originalSrcDescriptor = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
        Object.defineProperty(img, 'src', {
            set: function(value) {
                if (_manualPostbackInProgress) {
                    originalSrcDescriptor.set.call(this, value);
                    return;
                }
                if (typeof value === 'string' && isMonetagPostback(value)) {
                    console.log('[INTERCEPTOR] 🚫 Image Postback automático do Monetag bloqueado:', value);
                    return;
                }
                originalSrcDescriptor.set.call(this, value);
            },
            get: function() {
                return originalSrcDescriptor.get.call(this);
            }
        });
        return img;
    };
    
    // Interceptar navigator.sendBeacon
    if (navigator.sendBeacon) {
        const originalSendBeacon = navigator.sendBeacon.bind(navigator);
        navigator.sendBeacon = function(url, data) {
            if (_manualPostbackInProgress) {
                return originalSendBeacon(url, data);
            }
            if (typeof url === 'string' && isMonetagPostback(url)) {
                console.log('[INTERCEPTOR] 🚫 sendBeacon Postback automático BLOQUEADO:', url);
                return true;
            }
            return originalSendBeacon(url, data);
        };
    }

            const response = await fetch(url);
            const data = await response.json();

            if (data.success && data.data) {
                REQUIRED_IMPRESSIONS = data.data.required_impressions || 10;
                TaskState.impressions = data.data.impressions || 0;
                TaskState.requiredImpressionsLoaded = true;

                const reqImpText = document.getElementById('requiredImpressionsText');
                if (reqImpText) reqImpText.textContent = `${REQUIRED_IMPRESSIONS} anúncios`;

                updateUI();
            }
        } catch (err) {
            console.error('[REQUIREMENTS] ❌ Erro ao carregar valores (API principal):', err);
        }

        // Buscar dados de cliques E impressões (fallback) via API Click Checker
        try {

            const clickData = await clickResponse.json();

                console.log('[REQUIREMENTS]   - Cliques necessários:', REQUIRED_CLICKS);

    async function fetchStats() {
        let mainApiWorked = false;

        try {
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            console.log(`[STATS] [${timestamp}] Buscando estatísticas do usuário ${TaskState.userId}...`);

            const url = `${YOUNGMONEY_API}/monetag/progress?ymid=${TaskState.userId}`;
            const response = await fetch(url);
            const data = await response.json();

            console.log('[STATS] Resposta (impressões):', data);

            if (data.success && data.data) {
                mainApiWorked = true;
                const newImpressions = data.data.impressions || 0;

                const hasChanges = newImpressions !== TaskState.lastImpressions;

                if (hasChanges) {
                    TaskState.impressions = newImpressions;
                    TaskState.lastImpressions = newImpressions;
                    
                    REQUIRED_IMPRESSIONS = data.data.required_impressions || REQUIRED_IMPRESSIONS;
                    
                    updateUI();
                }

                console.log('[STATS] ✅ Impressões atualizadas:', TaskState.impressions, '/', REQUIRED_IMPRESSIONS);
            }
        } catch (err) {
            console.error('[STATS] ❌ Erro ao buscar estatísticas (API principal):', err);
        }

        // Buscar estatísticas de cliques E impressões (fallback) via API Click Checker
        try {
            const clickUrl = `https://monetag-postback-server-production.up.railway.app/api/stats/user/${TaskState.userId}`;
            const clickResponse = await fetch(clickUrl);
            const clickData = await clickResponse.json();

            if (clickData.success) {
                const newClicks = clickData.total_clicks || 0;

                if (newClicks !== TaskState.lastClicks) {
                    TaskState.clicks = newClicks;
                    TaskState.lastClicks = newClicks;
                    updateUI();
                }

                if (!mainApiWorked) {
                    const newImpressions = clickData.total_impressions || 0;
                    if (newImpressions !== TaskState.lastImpressions) {
                        TaskState.impressions = newImpressions;
                        TaskState.lastImpressions = newImpressions;
                        updateUI();
                    }
                    console.log('[STATS] ✅ Impressões atualizadas via fallback:', TaskState.impressions, '/', REQUIRED_IMPRESSIONS);
                }

                console.log('[STATS] ✅ Cliques atualizados:', TaskState.clicks, '/', REQUIRED_CLICKS);
            }
        } catch (err) {
            console.error('[STATS] ❌ Erro ao buscar estatísticas (cliques):', err);
        }
    }

    function updateUI() {
        if (!TaskState.requiredImpressionsLoaded) {
            return;
        }
        
        // Contadores (valores grandes nos boxes)
        document.getElementById('statImpressions').textContent = TaskState.impressions;
        document.getElementById('statClicks').textContent = TaskState.clicks;

        // Progresso de impressões (barra)
        const impressionProgress = Math.min((TaskState.impressions / REQUIRED_IMPRESSIONS) * 100, 100);
        document.getElementById('impressionBar').style.width = impressionProgress + '%';
        document.getElementById('impressionCount').textContent = `${TaskState.impressions}/${REQUIRED_IMPRESSIONS}`;

        if (TaskState.impressions >= REQUIRED_IMPRESSIONS) {
            document.getElementById('impressionBar').classList.add('completed');
        }

        // Progresso de cliques (barra)
        const clickProgress = Math.min((TaskState.clicks / REQUIRED_CLICKS) * 100, 100);
        document.getElementById('clickBar').style.width = clickProgress + '%';
        document.getElementById('clickCount').textContent = `${TaskState.clicks}/${REQUIRED_CLICKS}`;

        if (TaskState.clicks >= REQUIRED_CLICKS) {
            document.getElementById('clickBar').classList.add('completed');
        }

        // Texto de requisitos de cliques
        const reqClickText = document.getElementById('requiredClicksText');
        if (reqClickText) reqClickText.textContent = `${REQUIRED_CLICKS} cliques`;

        // Botão - tarefa completa requer AMBOS (impressões E cliques)
        const button = document.getElementById('adButton');

        const taskCompleted = TaskState.requiredImpressionsLoaded &&
                              TaskState.impressions >= REQUIRED_IMPRESSIONS &&
                              TaskState.clicks >= REQUIRED_CLICKS;

        if (taskCompleted) {
            button.style.display = 'none';
            showStatus('<i class="fas fa-check-circle"></i> Parabéns! Tarefa concluída. Volte para girar a roleta!', 'success');
        } else {
            hideStatus();
            button.style.display = 'flex';
            button.disabled = TaskState.isLoading || TaskState.isProcessing;

            if (TaskState.isLoading) {
                button.innerHTML = '<span class="spinner"></span> CARREGANDO DADOS...';
            } else if (TaskState.isProcessing) {
                button.innerHTML = '<span class="spinner"></span> CARREGANDO...';
            } else {
                button.innerHTML = '<i class="fas fa-play"></i> ASSISTIR ANÚNCIO';
            }
        }
    }

    function showStatus(message, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.innerHTML = message;
        statusEl.className = `status-message ${type}`;
        statusEl.style.display = 'block';
    }

    function hideStatus() {
        const statusEl = document.getElementById('statusMessage');
        if (statusEl) {
            statusEl.style.display = 'none';
        }
    }

    function handleAdClick() {
        if (TaskState.isProcessing) return;

        TaskState.isProcessing = true;
        updateUI();

        console.log('[AD] Iniciando exibição de anúncio');

        if (typeof window[SDK_FUNC] !== 'function') {
            console.warn('[AD] SDK não está pronto');
            TaskState.isProcessing = false;
            updateUI();
            showStatus('⚠️ Aguarde o carregamento...', 'warning');
            return;
        }

        console.log('[AD] Abrindo anúncio com SDK (type: end)...');

        window[SDK_FUNC]({
            type: 'end',
            ymid: TaskState.userId,
            requestVar: TaskState.userEmail
        }).then((result) => {
            console.log('[AD] ✅ Anúncio finalizado pelo usuário!');
            console.log('[AD] Resultado:', JSON.stringify(result));

            sendImpressionToServer();

            setTimeout(() => {
                fetchStats();
                TaskState.isProcessing = false;
                updateUI();
            }, 3000);
        }).catch(err => {
            console.error('[AD] ❌ Anúncio fechado/erro:', err);
            TaskState.isProcessing = false;
            updateUI();
        });
    }

    function startAutoRefresh() {
        console.log('[AUTO-REFRESH] Desabilitado');
    }

    function stopAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    }

    function openSpinWheel() {
        console.log('[SPIN] Abrindo roleta...');
        stopAutoRefresh();

        if (window.AndroidInterface?.onTaskCompleted) {
            window.AndroidInterface.onTaskCompleted();
        } else if (window.Android?.onTaskCompleted) {
            window.Android.onTaskCompleted();
        }

        if (window.Telegram?.WebApp?.close) {
            window.Telegram.WebApp.close();
        }
    }

    // ========================================
    // FUNÇÕES DE ALTERAÇÃO DO YMID
    // ========================================

    function updateYmidBadge() {
        const badgeText = document.getElementById('ymidBadgeText');
        if (badgeText && TaskState.userId) {
            badgeText.textContent = TaskState.userId;
        }
    }

    function openYmidModal() {
        const overlay = document.getElementById('ymidModalOverlay');
        const currentEl = document.getElementById('ymidModalCurrent');
        const inputEl = document.getElementById('ymidNewInput');
        const errorEl = document.getElementById('ymidModalError');

        if (currentEl) currentEl.textContent = TaskState.userId || '---';
        if (inputEl) inputEl.value = '';
        if (errorEl) errorEl.classList.remove('show');

        overlay.classList.add('active');

        setTimeout(() => { if (inputEl) inputEl.focus(); }, 300);
    }

    function closeYmidModal() {
        const overlay = document.getElementById('ymidModalOverlay');
        overlay.classList.remove('active');
    }

    function closeYmidModalOutside(event) {
        if (event.target === event.currentTarget) {
            closeYmidModal();
        }
    }

    function showYmidError(msg) {
        const errorEl = document.getElementById('ymidModalError');
        const errorText = document.getElementById('ymidModalErrorText');
        if (errorText) errorText.textContent = msg;
        if (errorEl) errorEl.classList.add('show');
    }

    async function confirmYmidChange() {
        const inputEl = document.getElementById('ymidNewInput');
        const confirmBtn = document.getElementById('ymidConfirmBtn');
        const errorEl = document.getElementById('ymidModalError');
        const newYmid = inputEl ? inputEl.value.trim() : '';

        if (errorEl) errorEl.classList.remove('show');

        if (!newYmid || newYmid.length === 0) {
            showYmidError('Por favor, insira um YMID.');
            return;
        }

        if (!/^[0-9]+$/.test(newYmid)) {
            showYmidError('O YMID deve conter apenas números.');
            return;
        }

        if (newYmid === TaskState.userId) {
            showYmidError('Este já é o seu YMID atual.');
            return;
        }

        if (confirmBtn) {
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Verificando...';
        }

        try {
            const profileUrl = `${PROFILE_ENDPOINT}?ymid=${newYmid}`;
            console.log('[YMID] Verificando novo YMID:', newYmid);

            const response = await fetch(profileUrl);
            const data = await response.json();

            console.log('[YMID] Resposta:', data);

            const oldYmid = TaskState.userId;
            TaskState.userId = newYmid;
            TaskState.impressions = 0;
            TaskState.lastImpressions = 0;
            TaskState.clicks = 0;
            TaskState.lastClicks = 0;

            localStorage.setItem('youngmoney_ymid', newYmid);

            const url = new URL(window.location.href);
            url.searchParams.set('ymid', newYmid);
            window.history.replaceState({}, '', url);
            window.TELEGRAM_USER_ID = newYmid;

            console.log('[YMID] ✅ YMID alterado de', oldYmid, 'para', newYmid);

            updateYmidBadge();
            closeYmidModal();

            fetchRequiredImpressions();
            fetchStats();
            checkAdSchedule();
            updateUI();

            showStatus('<i class="fas fa-check-circle"></i> YMID alterado com sucesso para ' + newYmid, 'success');
            setTimeout(() => hideStatus(), 3000);

        } catch (err) {
            console.error('[YMID] Erro:', err);
            showYmidError('Erro ao verificar. Tente novamente.');
        } finally {
            if (confirmBtn) {
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'Confirmar';
            }
        }
    }

    function logoutYmid() {
        localStorage.removeItem('youngmoney_ymid');
        TaskState.userId = null;
        TaskState.impressions = 0;
        TaskState.clicks = 0;
        closeYmidModal();
        window.location.href = '/login.html';
    }

    window.addEventListener('DOMContentLoaded', function() {
        init();
        setTimeout(updateYmidBadge, 200);
    });
</script>
</body>
</html>
